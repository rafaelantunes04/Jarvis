<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis — Login</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 360px;
      padding: 0 16px;
    }

    /* ── Logo / heading ── */
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .icon {
      width: 48px;
      height: 48px;
      background: var(--accent-lo);
      border: 1px solid rgba(124,106,247,.3);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }
    .login-logo .icon svg { width: 22px; height: 22px; color: var(--accent); }
    .login-logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 4px;
    }
    .login-logo p {
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Card ── */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 26px;
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group:last-of-type {
      margin-bottom: 20px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    .login-footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <div class="login-logo">
    <div class="icon">
      <!-- bolt icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
      </svg>
    </div>
    <h1>Jarvis</h1>
    <p>Introduz as tuas credenciais para continuar</p>
  </div>

  <div class="login-card">

    <div id="error-banner" class="error-banner" style="margin-bottom:16px"></div>

    <div class="form-group">
      <label class="lbl" for="inp-user">Utilizador</label>
      <input
        id="inp-user"
        class="field"
        type="text"
        placeholder="username"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
    </div>

    <div class="form-group">
      <label class="lbl" for="inp-pass">Palavra-passe</label>
      <input
        id="inp-pass"
        class="field"
        type="password"
        placeholder="••••••••"
        autocomplete="new-password"
      />
    </div>

    <button class="btn-primary" id="login-btn">Entrar</button>

  </div>

  <p class="login-footer">Jarvis Desktop &mdash; v0.1.0</p>
</div>

<script src="login.js"></script>
</body>
</html>
