<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      flex-direction: row;
    }

    /* ══════════════ LEFT SIDEBAR ══════════════ */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 0;
    }

    /* Brand */
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-brand .icon {
      width: 32px;
      height: 32px;
      background: var(--accent-lo);
      border: 1px solid rgba(124,106,247,.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .sidebar-brand .icon svg { width: 15px; height: 15px; color: var(--accent); }
    .sidebar-brand .brand-text h2 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin: 0 0 2px;
    }
    .sidebar-brand .brand-text span {
      font-size: 11px;
      color: var(--muted);
    }

    /* Nav items */
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 10px 8px;
    }
    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .8px;
      color: var(--muted);
      text-transform: uppercase;
      padding: 10px 8px 4px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      transition: background .12s, color .12s;
      user-select: none;
    }
    .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
    .nav-item:hover  { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--accent-lo); color: var(--accent); }
    .nav-item.active svg { color: var(--accent); }

    /* User / footer */
    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 12px 12px;
      flex-shrink: 0;
    }
    .user-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 10px;
    }
    .user-avatar {
      width: 30px;
      height: 30px;
      background: var(--accent-lo);
      border: 1px solid rgba(124,106,247,.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }
    .user-info .user-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .user-info .user-status { font-size: 11px; color: var(--muted); }

    .sidebar-footer .btn-ghost {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
    }
    .sidebar-footer .btn-ghost svg { width: 13px; height: 13px; }

    /* ══════════════ MAIN AREA ══════════════ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Chat header */
    .chat-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .chat-header .dot {
      width: 8px;
      height: 8px;
      background: #4caf7d;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .chat-header .title { font-size: 14px; font-weight: 600; color: var(--text); }
    .chat-header .sub   { font-size: 12px; color: var(--muted); margin-left: auto; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      pointer-events: none;
    }
    .empty-state svg { width: 32px; height: 32px; opacity: .3; }

    .msg {
      max-width: 68%;
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #1b2547;
      border: 1px solid #263770;
      border-bottom-right-radius: 3px;
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }
    .msg-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .msg.user .msg-tag { color: #7a9ef7; }
    .msg.bot  .msg-tag { color: var(--muted); }

    /* Typing */
    .typing {
      align-self: flex-start;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 3px;
      padding: 13px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .typing span {
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce .85s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-5px); }
    }

    /* Input bar */
    #input-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      height: 42px;
      max-height: 130px;
      overflow-y: auto;
      line-height: 1.45;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: var(--radius);
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s;
    }
    #send-btn:hover    { background: var(--accent-dk); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }
    #send-btn svg { width: 17px; height: 17px; }
  </style>
</head>
<body>

<!-- ════════════════ SIDEBAR ════════════════ -->
<aside class="sidebar">

  <div class="sidebar-brand">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
      </svg>
    </div>
    <div class="brand-text">
      <h2>Jarvis</h2>
      <span>assistant</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-label">Menu</div>

    <div class="nav-item active" onclick="switchTab('chat')">
      <!-- message icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      Chat
    </div>

    <div class="nav-item" onclick="switchTab('settings')">
      <!-- settings icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33
                 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33
                 l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4
                 h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06
                 A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51
                 a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9
                 a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
      Definições
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="user-row">
      <div class="user-avatar" id="avatar-initials">?</div>
      <div class="user-info">
        <div class="user-name"  id="sidebar-username">—</div>
        <div class="user-status">Online</div>
      </div>
    </div>
    <button class="btn-ghost" onclick="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      Sair
    </button>
  </div>
</aside>

<!-- ════════════════ MAIN ════════════════ -->
<main class="main">

  <div class="chat-header">
    <div class="dot"></div>
    <span class="title">Conversa</span>
    <span class="sub" id="header-user"></span>
  </div>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      Começa uma conversa com o Jarvis
    </div>
  </div>

  <div id="input-bar">
    <textarea id="msg-input" placeholder="Escreve uma mensagem…" rows="1"></textarea>
    <button id="send-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

</main>

<script src="chat.js"></script>
</body>
</html>
